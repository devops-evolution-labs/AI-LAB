services:

  llama-router:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: ai-lab-llama-router

    ports:
      - "11434:11434"

    volumes:
      - ./llama/models:/models

    command: >
      --models-dir /models
      --models-max 2
      --host 0.0.0.0
      --port 11434
      --ctx-size 4096
      --parallel 2
      --threads 16
      --batch-size 512
      --ubatch-size 512
      --cont-batching
      --n-gpu-layers 999
      --no-warmup
      --mlock

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    restart: unless-stopped


  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-lab-open-webui

    ports:
      - "3100:8080"

    cpus: "2.0"
    mem_limit: 4g

    environment:
      - WEBUI_AUTH=True
      - OPENAI_API_BASE_URL=http://agent-runner:3300/v1
      - OPENAI_API_KEY=dummy
      - ENABLE_OPENAI_API=True
      - ENABLE_OLLAMA_API=False
      - 'WEBUI_BANNERS=[{"id":"models-status","type":"info","title":"Status dos Modelos","content":"Acompanhe modelos ativos em: http://localhost:3300/models/dashboard","dismissible":true,"timestamp":1742000000}]'

    volumes:
      - open-webui:/app/backend/data

    depends_on:
      - llama-router

    restart: unless-stopped


  agent-runner:
    image: python:3.11-slim
    container_name: ai-lab-agent

    volumes:
      - ./workspace:/workspace

    working_dir: /workspace

    environment:
      - AI_LAB_MAX_CONTEXT_TOKENS=3072
      - AI_LAB_CONTEXT_MARGIN=640
      - AI_LAB_CHARS_PER_TOKEN=2.2

    command: >
      sh -c "pip install fastapi uvicorn requests pillow python-multipart &&
             uvicorn agent:app --host 0.0.0.0 --port 3300"

    ports:
      - "3300:3300"

    cpus: "2.0"
    mem_limit: 2g

    restart: unless-stopped


  model-warmup:
    image: curlimages/curl:8.12.1
    container_name: ai-lab-model-warmup

    depends_on:
      - llama-router

    command: >
      sh -c "
      for i in $(seq 1 60); do
        if curl -sf http://llama-router:11434/v1/models >/dev/null; then
          break;
        fi;
        sleep 2;
      done;
      curl -s http://llama-router:11434/v1/chat/completions
      -H 'Content-Type: application/json'
      -d '{\"model\":\"codigo\",\"messages\":[{\"role\":\"user\",\"content\":\"warmup\"}],\"max_tokens\":1,\"stream\":false}' >/dev/null || true;
      echo warmup_done;
      "

    restart: "no"


  mcp-shell:
    profiles: ["mcp"]
    image: node:20
    container_name: ai-lab-mcp-shell

    command: >
      sh -c "npm install -g @modelcontextprotocol/server-shell &&
             mcp-server-shell"

    ports:
      - "3402:3000"

    restart: unless-stopped


  mcp-git:
    profiles: ["mcp"]
    image: node:20
    container_name: ai-lab-mcp-git

    volumes:
      - ./workspace:/workspace

    command: >
      sh -c "npm install -g @modelcontextprotocol/server-git &&
             mcp-server-git /workspace"

    ports:
      - "3403:3000"

    restart: unless-stopped


  mcp-web:
    profiles: ["mcp"]
    image: node:20
    container_name: ai-lab-mcp-web

    command: >
      sh -c "npm install -g @modelcontextprotocol/server-fetch &&
             mcp-server-fetch"

    ports:
      - "3404:3000"

    restart: unless-stopped


volumes:
  open-webui:
